" target="_blank"><span class="news-source">City</span>City of Eugene</a></li>
        </ul>
      </div>
    </div>

  </div>
</main>

<script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>

<script>
// ══════════════════════════════════════════════════════════
// GOOGLE API CONFIGURATION
// ══════════════════════════════════════════════════════════
const CLIENT_ID = '493713294892-7hjec2ik81ll3ophl85uhujj5ositfk8.apps.googleusercontent.com';
const API_KEY = 'AIzaSyCdmAgb1hU3D2yN-jn.J0rChFsFq02gISAs';
const DISCOVERY_DOCS = [
  'https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest',
  'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'
];
const SCOPES = 'https://www.googleapis.com/auth/tasks.readonly https://www.googleapis.com/auth/calendar.readonly';

let tokenClient;
let gapiInited = false;
let gisInited = false;

function gapiLoaded() {
  gapi.load('client', initializeGapiClient);
}

async function initializeGapiClient() {
  await gapi.client.init({
    apiKey: API_KEY,
    discoveryDocs: DISCOVERY_DOCS,
  });
  gapiInited = true;
  maybeEnableButtons();
}

function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: '',
  });
  gisInited = true;
  maybeEnableButtons();
}

function maybeEnableButtons() {
  if (gapiInited && gisInited) {
    document.getElementById('connectBtn').disabled = false;
  }
}

function handleAuthClick() {
  tokenClient.callback = async (resp) => {
    if (resp.error !== undefined) throw resp;
    document.getElementById('authStatus').textContent = 'Connected';
    document.getElementById('connectBtn').style.display = 'none';
    document.getElementById('signoutBtn').style.display = 'block';
    await loadGoogleData();
  };
  if (gapi.client.getToken() === null) {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  } else {
    tokenClient.requestAccessToken({ prompt: '' });
  }
}

function handleSignoutClick() {
  const token = gapi.client.getToken();
  if (token !== null) {
    google.accounts.oauth2.revoke(token.access_token);
    gapi.client.setToken('');
  }
  document.getElementById('authStatus').textContent = 'Not connected';
  document.getElementById('connectBtn').style.display = 'block';
  document.getElementById('signoutBtn').style.display = 'none';
  document.getElementById('taskList').innerHTML = '>Connect Google to load tasks</li>';
  document.getElementById('agendaList').innerHTML = '>Connect Google to load events</li>';
}
  
// ══════════════════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════════════════
async function loadGoogleData() {
  await Promise.all([loadTasks(), loadEvents()]);
}

async function loadTasks() {
  try {
    const taskListResp = await gapi.client.tasks.tasklists.list({ maxResults: 1 });
    if (!taskListResp.result.items?.length) {
      document.getElementById('taskList').innerHTML = '>No task lists found</li>';
      return;
    }
    const listId = taskListResp.result.items[0].id;
    const tasksResp = await gapi.client.tasks.tasks.list({
      tasklist: listId,
      showCompleted: false,
      maxResults: 20,
    });
    const ul = document.getElementById('taskList');
    ul.innerHTML = '';
    if (!tasksResp.result.items || tasksResp.result.items.length === 0) {
      ul.innerHTML = '>No active tasks</li>';
      return;
    }
    tasksResp.result.items.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item';
      const dueText = task.due ? formatTaskDue(task.due) : '';
      const overdue = task.due && new Date(task.due) < new Date() ? ' overdue' : '';
      li.innerHTML = `
        <div class="task-check" onclick="toggleTask(this)"></div>
        <div style="flex:1">
          <div class="task-title">${escapeHtml(task.title || '(untitled)')}</div>
          ${dueText ? `<div class="task-due${overdue}">${dueText}</div>` : ''}
        </div>`;
      ul.appendChild(li);
    });
    updateTaskCount();
  } catch (err) {
    console.error('Error loading tasks:', err);
    document.getElementById('taskList').innerHTML = '>Error loading tasks</li>';
  }
}

async function loadEvents() {
  try {
    const now = new Date();
    const timeMin = now.toISOString();
    const timeMax = new Date(now.getTime() + 14 * 24 * 60 * 60 * 1000).toISOString();
    const resp = await gapi.client.calendar.events.list({
      calendarId: 'primary',
      timeMin,
      timeMax,
      singleEvents: true,
      orderBy: 'startTime',
      maxResults: 10,
    });
    const ul = document.getElementById('agendaList');
    ul.innerHTML = '';
    if (!resp.result.items || resp.result.items.length === 0) {
      ul.innerHTML = '>No upcoming events</li>';
      return;
    }
    resp.result.items.forEach(ev => {
      const start = ev.start.dateTime || ev.start.date;
      const startDate = new Date(start);
      const timeLabel = ev.start.dateTime
        ? startDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
        : 'All day';
      const li = document.createElement('li');
      li.className = 'agenda-item';
      li.innerHTML = `
        <div class="time">${timeLabel}</div>
        <div style="flex:1">
          <div class="summary">${escapeHtml(ev.summary || '(no title)')}</div>
          ${ev.location ? `<div class="location">${escapeHtml(ev.location)}</div>` : ''}
        </div>`;
      ul.appendChild(li);
    });
  } catch (err) {
    console.error('Error loading events:', err);
    document.getElementById('agendaList').innerHTML = '>Error loading events</li>';
  }
}
  
// ══════════════════════════════════════════════════════════
// TASKS - LOCAL MANAGEMENT
// ══════════════════════════════════════════════════════════
function toggleTask(el) {
  const item = el.closest('.task-item');
  item.classList.toggle('done');
  updateTaskCount();
}

function updateTaskCount() {
  const total = document.querySelectorAll('.task-item').length;
  const done = document.querySelectorAll('.task-item.done').length;
  const active = total - done;
  document.getElementById('taskBadge').textContent = active > 0 ? active : '✓';
}

function addLocalTask() {
  const input = document.getElementById('newTaskInput');
  const text = input.value.trim();
  if (!text) return;
  const ul = document.getElementById('taskList');
  if (ul.querySelector('.empty-state')) ul.innerHTML = '';
  const li = document.createElement('li');
  li.className = 'task-item';
  li.innerHTML = `
    <div class="task-check" onclick="toggleTask(this)"></div>
    <div style="flex:1"><div class="task-title">${escapeHtml(text)}</div></div>`;
  ul.appendChild(li);
  input.value = '';
  updateTaskCount();
}

// ══════════════════════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════════════════════
let currentMonth = new Date();

function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  document.getElementById('calMonthLabel').textContent = 
    currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
    const dow = document.createElement('div');
    dow.className = 'cal-dow';
    dow.textContent = day;
    grid.appendChild(dow);
  });
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    const day = document.createElement('div');
    day.className = 'cal-day other-month';
    day.textContent = prevMonthDays - i;
    grid.appendChild(day);
  }
  const today = new Date();
  for (let d = 1; d <= daysInMonth; d++) {
    const day = document.createElement('div');
    day.className = 'cal-day';
    day.textContent = d;
    if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) {
      day.classList.add('today');
    }
    grid.appendChild(day);
  }
  const totalCells = grid.children.length - 7;
  const remaining = 42 - totalCells;
  for (let d = 1; d <= remaining; d++) {
    const day = document.createElement('div');
    day.className = 'cal-day other-month';
    day.textContent = d;
    grid.appendChild(day);
  }
}

function changeMonth(delta) {
  currentMonth.setMonth(currentMonth.getMonth() + delta);
  renderCalendar();
}
  
// ══════════════════════════════════════════════════════════
// CLOCK & DATE
// ══════════════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('liveClock').textContent = 
    now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('focusDate').textContent = now.toLocaleDateString('en-US', options);
}

// ══════════════════════════════════════════════════════════
// NOTES
// ══════════════════════════════════════════════════════════
function saveNotes() {
  const text = document.getElementById('notesArea').value;
  localStorage.setItem('dashboardNotes', text);
  document.getElementById('notesSaved').textContent = 'Saved';
  setTimeout(() => { document.getElementById('notesSaved').textContent = ''; }, 2000);
}

function loadNotes() {
  const saved = localStorage.getItem('dashboardNotes');
  if (saved) {
    document.getElementById('notesArea').value = saved;
  }
}

function clearNotes() {
  if (confirm('Clear all notes?')) {
    document.getElementById('notesArea').value = '';
    localStorage.removeItem('dashboardNotes');
  }
}

// ══════════════════════════════════════════════════════════
// FOCUS INPUT
// ══════════════════════════════════════════════════════════
function saveFocus() {
  const text = document.getElementById('focusInput').value;
  const date = new Date().toDateString();
  localStorage.setItem('dashboardFocus', JSON.stringify({ text, date }));
}

function loadFocus() {
  const saved = localStorage.getItem('dashboardFocus');
  if (saved) {
    const { text, date } = JSON.parse(saved);
    const today = new Date().toDateString();
    if (date === today) {
      document.getElementById('focusInput').value = text;
    }
  }
}
  
// ══════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════
function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

function formatTaskDue(dueString) {
  const due = new Date(dueString);
  const now = new Date();
  const diffDays = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
  if (diffDays < 0) return 'Overdue';
  if (diffDays === 0) return 'Due today';
  if (diffDays === 1) return 'Due tomorrow';
  if (diffDays <= 7) return `Due in ${diffDays} days`;
  return `Due ${due.toLocaleDateString()}`;
}

// ══════════════════════════════════════════════════════════
// INITIALIZATION
// ══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  updateClock();
  setInterval(updateClock, 60000);
  renderCalendar();
  loadNotes();
  loadFocus();
  updateTaskCount();
  
  document.getElementById('notesArea').addEventListener('input', saveNotes);
  document.getElementById('focusInput').addEventListener('input', saveFocus);
});
</script>

</body>
</html>
